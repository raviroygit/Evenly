<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__OG_TITLE__</title>
    <!-- Open Graph: show app logo in WhatsApp/SMS link previews instead of App Store screenshot -->
    <meta property="og:image" content="__OG_IMAGE_URL__">
    <meta property="og:title" content="__OG_TITLE__">
    <meta property="og:description" content="Download EvenlySplit - Split expenses, share memories.">
    <meta property="og:url" content="__OG_URL__">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="__OG_IMAGE_URL__">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .spinner {
            margin: 30px auto;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 20px;
            font-style: italic;
        }

        .button {
            display: none;
            padding: 14px 32px;
            margin: 8px auto;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s;
            cursor: pointer;
            width: 80%;
            max-width: 320px;
            text-align: center;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .button.show {
            display: block;
        }

        #openAppBtn.show {
            display: block;
            background: #10b981;
            color: white;
        }

        #fallbackBtn.show {
            display: block;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1 id="title">Opening Evenly App...</h1>
        <p id="message">Please wait while we redirect you to the Evenly app.</p>
        <div class="spinner" id="spinner"></div>
        <p class="status" id="status">Checking if app is installed...</p>
        <a href="#" class="button" id="openAppBtn">Open EvenlySplit</a>
        <a href="#" class="button" id="fallbackBtn">Download App</a>
    </div>

    <script>
        // Get deep link context injected by server
        const context = window.DEEP_LINK_CONTEXT || { type: 'invitation', data: {} };

        // Get parameters from URL (fallback)
        const urlParams = new URLSearchParams(window.location.search);
        const invitationToken = urlParams.get('token') || '';

        // App identifiers
        const PACKAGE_NAME = 'com.nxtgenaidev.evenly';
        const APP_STORE_ID = '6756101586';

        // App store URLs
        const PLAY_STORE = 'https://play.google.com/store/apps/details?id=' + PACKAGE_NAME;
        const APP_STORE = 'https://apps.apple.com/us/app/evenlysplit/id' + APP_STORE_ID;

        // Build deep link based on context type
        let deepLinkPath = '';
        let contextMessage = 'Opening Evenly App...';

        switch (context.type) {
            case 'invitation':
                var token = context.data.token || invitationToken;
                deepLinkPath = 'invitation/' + token;
                contextMessage = 'Opening your group invitation...';
                break;
            case 'group':
                deepLinkPath = 'group/' + context.data.groupId;
                contextMessage = 'Opening your group...';
                break;
            case 'expense':
                deepLinkPath = 'group/' + context.data.groupId;
                contextMessage = 'Opening your expense details...';
                break;
            case 'khata':
                deepLinkPath = 'khata';
                contextMessage = 'Opening Khata...';
                break;
            default:
                deepLinkPath = '';
                contextMessage = 'Opening Evenly App...';
        }

        // Build all link formats
        var customSchemeLink = 'evenly://' + deepLinkPath;

        // Android Intent URI - works reliably in Gmail, Chrome, WebViews
        var intentUri = 'intent://' + deepLinkPath
            + '#Intent;scheme=evenly;package=' + PACKAGE_NAME
            + ';S.browser_fallback_url=' + encodeURIComponent(PLAY_STORE) + ';end';

        // Auto-detect device
        var ua = navigator.userAgent.toLowerCase();
        var isAndroid = ua.indexOf('android') > -1;
        var isIOS = /iphone|ipad|ipod/.test(ua);

        // UI elements
        var titleEl = document.getElementById('title');
        var messageEl = document.getElementById('message');
        var statusEl = document.getElementById('status');
        var spinnerEl = document.getElementById('spinner');
        var openAppBtn = document.getElementById('openAppBtn');
        var fallbackBtn = document.getElementById('fallbackBtn');

        var appOpened = false;

        function showButtons() {
            spinnerEl.style.display = 'none';
            openAppBtn.classList.add('show');
            fallbackBtn.classList.add('show');
            if (isAndroid) {
                fallbackBtn.textContent = 'Download from Play Store';
                fallbackBtn.href = PLAY_STORE;
            } else if (isIOS) {
                fallbackBtn.textContent = 'Download from App Store';
                fallbackBtn.href = APP_STORE;
            } else {
                openAppBtn.style.display = 'none';
                fallbackBtn.textContent = 'Visit Website';
                fallbackBtn.href = 'https://www.evenly.app';
            }
        }

        function onAppOpened() {
            appOpened = true;
            statusEl.textContent = 'App opened!';
        }

        // Detect if app opens (page goes to background)
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) onAppOpened();
        });
        window.addEventListener('pagehide', function () { onAppOpened(); });

        // ---- OPEN APP LOGIC ----
        function tryOpenApp() {
            statusEl.textContent = contextMessage;

            if (isAndroid) {
                // Android Intent URI - works in Gmail, Chrome, all WebViews
                // The intent:// scheme tells Android to find the app by package name
                // If app not installed, browser_fallback_url sends to Play Store
                window.location.href = intentUri;

                // Show manual buttons after 1.5s as safety net
                setTimeout(function () {
                    if (!appOpened) {
                        statusEl.textContent = 'Tap the button below to open the app';
                        showButtons();
                    }
                }, 1500);

            } else if (isIOS) {
                // iOS: try custom scheme via iframe (doesn't show error if app not installed)
                var iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = customSchemeLink;
                document.body.appendChild(iframe);

                // Also try direct location change after a small delay
                setTimeout(function () {
                    if (!appOpened) {
                        window.location.href = customSchemeLink;
                    }
                }, 100);

                // Show buttons and fallback after 2s
                setTimeout(function () {
                    if (!appOpened) {
                        statusEl.textContent = 'Tap the button below to open the app';
                        showButtons();
                    }
                }, 2000);

                // Redirect to App Store after 4s if app didn't open
                setTimeout(function () {
                    if (!appOpened) {
                        // Don't auto-redirect, let user choose
                        statusEl.textContent = "Can't find the app? Download it below.";
                    }
                }, 4000);

            } else {
                // Desktop
                titleEl.textContent = 'EvenlySplit';
                messageEl.textContent = 'Please open this link on your mobile device to use the app.';
                statusEl.textContent = '';
                spinnerEl.style.display = 'none';
                fallbackBtn.textContent = 'Visit Website';
                fallbackBtn.href = 'https://www.evenly.app';
                fallbackBtn.classList.add('show');
            }
        }

        // Open App button - manual trigger
        openAppBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (isAndroid) {
                window.location.href = intentUri;
            } else if (isIOS) {
                window.location.href = customSchemeLink;
            }
        });

        // Fallback button
        fallbackBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (isAndroid) {
                window.location.href = PLAY_STORE;
            } else if (isIOS) {
                window.location.href = APP_STORE;
            } else {
                window.location.href = 'https://www.evenly.app';
            }
        });

        // Start after page loads
        setTimeout(tryOpenApp, 300);
    </script>
</body>

</html>
